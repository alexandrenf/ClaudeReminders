# fly.toml app configuration file generated for claudereminders on 2026-03-19T14:52:19-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claudereminders'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[restart]]
  policy = 'always'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
